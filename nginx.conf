server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Angular SPA - all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend via Coolify's Traefik proxy
    location /api/ {
        resolver 8.8.8.8 valid=30s ipv6=off;
        set $backend "api-roadchaser.sebastian-mueller.li";
        proxy_pass https://$backend;
        proxy_ssl_server_name on;
        proxy_set_header Host $backend;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running tile/geo requests
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;

        # Large response buffers (GeoJSON responses can be several MB)
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 8 512k;
        proxy_busy_buffers_size 1m;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
