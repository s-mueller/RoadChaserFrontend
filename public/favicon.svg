<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="road" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#road)" stroke="#e94560" stroke-width="1"/>
  <!-- Winding road -->
  <path d="M10 28 C10 22, 22 20, 22 14 C22 8, 10 6, 14 2" fill="none" stroke="#4a4a6a" stroke-width="5" stroke-linecap="round"/>
  <path d="M10 28 C10 22, 22 20, 22 14 C22 8, 10 6, 14 2" fill="none" stroke="#8892b0" stroke-width="3" stroke-linecap="round"/>
  <!-- Center line dashes -->
  <path d="M10 28 C10 22, 22 20, 22 14 C22 8, 10 6, 14 2" fill="none" stroke="url(#accent)" stroke-width="1" stroke-linecap="round" stroke-dasharray="3 4"/>
  <!-- Location pin -->
  <circle cx="22" cy="14" r="3" fill="#e94560"/>
  <circle cx="22" cy="14" r="1.5" fill="#fff"/>
</svg>
