<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- RoadChaser Logo - Modern Minimalist -->
  <defs>
    <linearGradient id="road-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  
  <!-- Main road/path shape -->
  <path d="M16 4 C10 8 10 20 16 24 C22 20 22 8 16 4" fill="none" stroke="url(#road-gradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Path highlight line -->
  <path d="M16 4 C10 8 10 20 16 24 C22 20 22 8 16 4" fill="none" stroke="url(#accent-gradient)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="2 2"/>
  
  <!-- Map pin marker at destination -->
  <circle cx="16" cy="20" r="2.5" fill="#10b981" opacity="0.8"/>
  <circle cx="16" cy="20" r="1" fill="#ffffff"/>
  
  <!-- Small location indicator -->
  <circle cx="8" cy="12" r="1.5" fill="#2563eb" opacity="0.6"/>
</svg>
